<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>capitalize</title>
</head>
<body>
  <script>
    function capitalize(str) {
      let slicedStr = str.slice(0,1);
      let upperSlicedStr = slicedStr.toUpperCase();
      let restStr = str.slice(1);
      let lowerRestStr = restStr.toLowerCase();
      return upperSlicedStr + lowerRestStr;
    }
    console.log(capitalize("eddie"));
  </script>
</body>
</html>
