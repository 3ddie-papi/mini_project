<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Letter</title>
</head>
<body>
  <script>
    function lastLetter(str) {
      let strLength = str.length;
      let newStrLength = strLength - 1;
      let lastLet = str.slice([newStrLength]);
      return lastLet;
    }
    console.log(lastLetter("Mercy"));
  </script>
</body>
</html>
